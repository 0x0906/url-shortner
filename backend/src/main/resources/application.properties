server.port=5000

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/url_shortener}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJwtTokenGenerationThatIsLongEnough123456}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Client
client.url=${CLIENT_URL:http://localhost:5173}

# Rate Limiting
rate-limit.api.max-requests=150
rate-limit.api.window-ms=900000
rate-limit.auth.max-requests=30
rate-limit.auth.window-ms=900000

# LRU Cache
cache.url-resolution.max-size=500

# Server
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Jackson Property Naming
spring.jackson.property-naming-strategy=SNAKE_CASE
